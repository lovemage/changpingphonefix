<script>
$(document).ready(function() {
	// 初始化 WOW 動畫
	new WOW().init();
	
	// 載入維修案例
	loadPortfolioPage();
	
	// 確保懸浮按鈕顯示

		floatingButtons.style.display = 'block';
		floatingButtons.style.visibility = 'visible';
	}
});

// 載入維修案例頁面
async function loadPortfolioPage() {
	try {
		const response = await fetch('/site-config.json');
		let config;
		
		if (response.ok) {
			config = await response.json();
		} else {
			// 使用預設配置
			config = {
				portfolio: {
					cases: [
						{title: "iPhone螢幕維修案例", image: "/images/iphone.jpg", category: "iphone", alt: "iPhone螢幕維修案例"},
						{title: "iPhone電池更換", image: "/images/iphone2.jpg", category: "iphone", alt: "iPhone電池更換"},
						{title: "iPhone主機板維修", image: "/images/iphone3.jpg", category: "iphone", alt: "iPhone主機板維修"},
						{title: "iPhone充電孔維修", image: "/images/iphone4.jpg", category: "iphone", alt: "iPhone充電孔維修"},
						{title: "Android手機維修", image: "/images/android.jpg", category: "android", alt: "Android手機維修"},
						{title: "Android螢幕更換", image: "/images/an1.jpg", category: "android", alt: "Android螢幕更換"},
						{title: "Android電池維修", image: "/images/an2.jpg", category: "android", alt: "Android電池維修"},
						{title: "Android系統修復", image: "/images/an3.jpg", category: "android", alt: "Android系統修復"},
						{title: "平板螢幕維修", image: "/images/pad1.jpg", category: "tablet", alt: "平板螢幕維修"},
						{title: "平板充電維修", image: "/images/pad2.jpg", category: "tablet", alt: "平板充電維修"}
					]
				}
			};
		}
		
		renderPortfolio(config.portfolio.cases);
		
	} catch (error) {
		console.error('載入維修案例失敗:', error);
		document.getElementById('portfolio-container').innerHTML = `
			<div style="text-align: center; padding: 60px 0; width: 100%;">
				<p style="color: #666;">載入維修案例時發生錯誤，請重新整理頁面。</p>
			</div>
		`;
	}
}

// 渲染維修案例
function renderPortfolio(cases) {
	const container = document.getElementById('portfolio-container');
	
	if (!cases || cases.length === 0) {
		container.innerHTML = `
			<div style="text-align: center; padding: 60px 0; width: 100%;">
				<p style="color: #666;">目前沒有維修案例</p>
			</div>
		`;
		return;
	}
	
	const casesHTML = cases.map(caseItem => `
		<div class="iso-box ${caseItem.category} col-lg-4 col-md-4 col-sm-6">
			<a href="${caseItem.image}" data-lightbox-gallery="portfolio-gallery">
				<img src="${caseItem.image}" alt="${caseItem.alt}" style="width: 100%; height: 250px; object-fit: cover; display: block;">
			</a>
		</div>
	`).join('');
	
	container.innerHTML = casesHTML;
	
	// 重新初始化 isotope 和 lightbox
	setTimeout(() => {
		initializePortfolioFeatures();
	}, 100);
}

// 獲取分類中文名稱
function getCategoryName(category) {
	const names = {
		'iphone': 'iPhone',
		'android': '安卓手機',
		'tablet': '平板',
		'laptop': '電腦'
	};
	return names[category] || category;
}

// 初始化維修案例功能
function initializePortfolioFeatures() {
	const $container = $('.iso-box-wrapper');
	
	// 初始化 isotope
	$container.imagesLoaded(function() {
		$container.isotope({
			itemSelector: '.iso-box',
			layoutMode: 'fitRows'
		});
	});
	
	// 初始化 lightbox
	$('.iso-box-section a').nivoLightbox({
		effect: 'fadeScale',
	});
	
	// 篩選功能
	$('.filter-wrapper a').click(function(e) {
		e.preventDefault();

		$('.filter-wrapper a').removeClass('selected');
		$(this).addClass('selected');

		const filterValue = $(this).attr('data-filter');
		$container.isotope({ filter: filterValue });
	});
}
</script>
